name: Verify secret stores (real hardware)

# Runs the real macOS Keychain / real Linux Secret Service round-trip tests (TASK-168, follow-up to
# TASK-113) on GitHub's actual macOS/Linux runners -- real hardware in the cloud, since Apple's terms
# prohibit macOS virtualization on non-Apple hardware and this project's dev box is Windows-only. Unlike
# the everyday fake-backed unit tests (MacOsKeychainSecretStoreTests, LinuxSecretToolSecretStoreTests),
# these exercise the real Security.framework P/Invoke path and the real secret-tool binary against a real
# Secret Service daemon. Not run on every push/PR (hitting a real OS credential store is slower and
# noisier than the everyday CI gate, same reasoning as nightly-corpus.yml) -- scheduled weekly plus
# on-demand via workflow_dispatch.
on:
  schedule:
    # 04:00 UTC every Monday.
    - cron: "0 4 * * 1"
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read

jobs:
  macos-keychain:
    name: macOS Keychain round-trip
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore JustDownload.sln

      - name: Build (Release)
        run: dotnet build JustDownload.sln -c Release --no-restore

      - name: Run real Keychain round-trip (TASK-168 AC0)
        run: >-
          dotnet test JustDownload.sln -c Release --no-build
          --filter "Category=RealSecretStore"
          --logger "console;verbosity=normal"

  linux-secret-service:
    name: Linux Secret Service round-trip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install libsecret + GNOME Keyring + D-Bus
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring libsecret-tools dbus-x11

      - name: Restore
        run: dotnet restore JustDownload.sln

      - name: Build (Release)
        run: dotnet build JustDownload.sln -c Release --no-restore

      - name: Run real Secret Service round-trip (TASK-168 AC1)
        # A CI runner has no logged-in desktop session (no D-Bus session bus, no unlocked keyring
        # collection), which secret-tool needs -- dbus-run-session provides the session bus, and
        # gnome-keyring-daemon --unlock creates+unlocks a fresh login collection with an empty
        # passphrase (piped via stdin), the standard headless pattern for exercising libsecret in CI.
        run: |
          dbus-run-session -- bash -c '
            set -euo pipefail
            eval "$(printf "\n" | gnome-keyring-daemon --unlock --components=secrets)"
            dotnet test JustDownload.sln -c Release --no-build --filter "Category=RealSecretStore" --logger "console;verbosity=normal"
          '
