<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JustDownload</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="puhead">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14"/></svg>
    </span>
    <b>JustDownload</b>
    <span class="st" id="status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Checking…</span>
    </span>
  </div>

  <div class="pubody">
    <button class="pubtn" id="send-link" type="button">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1m-1 5a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg>
      Send this page link to app
    </button>

    <div class="purow">
      <span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3 4 6v6c0 4 3.5 7 8 9 4.5-2 8-5 8-9V6z"/></svg></span>
      Detect videos on this site
      <span class="trail"><span class="toggle on" id="site-toggle" role="switch" aria-checked="true"></span></span>
    </div>
    <div class="purow">
      <span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3v12m0 0-4-4m4 4 4-4M5 21h14"/></svg></span>
      Take over browser downloads
      <span class="trail"><span class="toggle on" id="intercept-toggle" role="switch" aria-checked="true"></span></span>
    </div>
    <div class="purow" id="open-settings" role="button" tabindex="0">
      <span class="ico" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.3-1-2 3.4L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.5a7 7 0 0 0 .1-1z"/></svg></span>
      Open extension settings
      <span class="trail chev">›</span>
    </div>
  </div>

  <script src="jdcore.js"></script>
  <script src="popup.js"></script>
</body>
</html>
